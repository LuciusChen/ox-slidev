name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Install Emacs
        run: |
          sudo apt-get update
          sudo apt-get install -y emacs-nox
      - name: Run byte compilation
        run: make compile
      - name: Run ERT suite
        run: make test
      - name: Run Slidev smoke build
        run: make smoke
